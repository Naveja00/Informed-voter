services:
  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    depends_on:
      - api
  api:
    build: ./apps/api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/informed_voter
    depends_on:
      - db
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: informed_voter
    ports:
      - "5432:5432"
